<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地火诀全参数模拟器 (攻速联动版)</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #2a2a2a; padding: 12px; border-radius: 8px; border-top: 3px solid #3498db; text-align: center;}
        .stat-label { font-size: 12px; color: #999; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; color: #00ff00; font-family: 'Consolas', monospace; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #252525; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 13px; color: #f1c40f; margin-bottom: 8px; font-weight: bold; }
        input { padding: 10px; background: #121212; border: 1px solid #555; color: #fff; border-radius: 4px; font-size: 14px; }
        .btn-refresh { grid-column: 1 / -1; padding: 15px; background: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        canvas { width: 100%; height: 450px; background: #000; border-radius: 8px; border: 1px solid #333; }
        .log-panel { height: 450px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; }
        #eventLog { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; font-family: 'Consolas', monospace; color: #ccc; }
        .log-hit-t0 { color: #00ff00; } .log-hit-t1 { color: #3498db; }
    </style>
</head>
<body>

<div class="container">
    <div class="summary-bar">
        <div class="stat-card"><span class="stat-label">总伤害跳数</span><span id="res_total" class="stat-value">0</span></div>
        <div class="stat-card"><span class="stat-label">理论 CD (2/攻速)</span><span id="res_cd" class="stat-value">0ms</span></div>
        <div class="stat-card"><span class="stat-label">单轮总时长(含延迟)</span><span id="res_cycle" class="stat-value">0ms</span></div>
        <div class="stat-card"><span class="stat-label">输出效率 (跳/秒)</span><span id="res_per_sec" class="stat-value">0</span></div>
    </div>

    <div class="config-grid">
        <div class="field">
            <label>人物攻速 (Speed)</label>
            <input type="number" id="cfg_speed" value="2.04" step="0.01" oninput="autoCalc()">
        </div>
        <div class="field">
            <label>前摇补正 (ms)</label>
            <input type="number" id="cfg_pre_ms" value="0">
            <small style="color:#666; font-size:10px;">(根据实际微调，参考300)</small>
        </div>
        <div class="field">
            <label>T0-T1间隔补正 (ms)</label>
            <input type="number" id="cfg_t1_ms" value="1000">
            <small style="color:#666; font-size:10px;">(根据实际微调，参考870)</small>
        </div>
        <div class="field">
            <label>网络延迟 (Ping)</label>
            <input type="number" id="cfg_net_ms" value="40">
        </div>
        <div class="field">
            <label>测试时长 (秒)</label>
            <input type="number" id="cfg_duration" value="10">
        </div>
        <button class="btn-refresh" onclick="runSimulation()">应用参数并生成数轴</button>
    </div>

    <div class="layout">
        <canvas id="mainCanvas"></canvas>
        <div class="log-panel"><div id="eventLog"></div></div>
    </div>
</div>

<script>
// 以你的 1.77 攻速作为基准常数
const BASE_SPEED = 1.77;
const BASE_PRE = 345;
const BASE_T1 = 870;

function autoCalc() {
    const speed = parseFloat(document.getElementById('cfg_speed').value) || 1.0;
    // 攻速越高，时间越短。公式：基准时间 * (基准攻速 / 当前攻速)
    const ratio = BASE_SPEED / speed;
    document.getElementById('cfg_pre_ms').value = Math.round(BASE_PRE * ratio);
    document.getElementById('cfg_t1_ms').value = Math.round(BASE_T1 * ratio);
}

function runSimulation() {
    const speed = parseFloat(document.getElementById('cfg_speed').value);
    const preMs = parseFloat(document.getElementById('cfg_pre_ms').value);
    const t1Ms = parseFloat(document.getElementById('cfg_t1_ms').value);
    const netMs = parseFloat(document.getElementById('cfg_net_ms').value);
    const duration = parseFloat(document.getElementById('cfg_duration').value);
    const totalMaxMs = duration * 1000;

    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('eventLog');
    logEl.innerHTML = "";

    const W = canvas.offsetWidth; const H = canvas.offsetHeight;
    canvas.width = W * window.devicePixelRatio; canvas.height = H * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

    let currentTime = 0;
    let events = [];
    let round = 1;

    // 模拟算法
    while (currentTime < totalMaxMs) {
        let t0 = currentTime + preMs + netMs;
        if (t0 > totalMaxMs) break;
        events.push({ t: t0, label: `地火${round}-T0`, color: '#00ff00' });
        
        let t1 = t0 + t1Ms;
        if (t1 > totalMaxMs) break;
        events.push({ t: t1, label: `地火${round}-T1`, color: '#3498db' });

        currentTime = t1;
        round++;
        if(round > 500) break;
    }

    // 更新面板
    document.getElementById('res_total').innerText = events.length;
    document.getElementById('res_cd').innerText = (2000 / speed).toFixed(0) + "ms";
    document.getElementById('res_cycle').innerText = (preMs + t1Ms + netMs).toFixed(0) + "ms";
    document.getElementById('res_per_sec').innerText = (events.length / duration).toFixed(2);

    // 绘制数轴
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    const pad = 60; const axisY = H - 100; const scale = (W - pad * 2) / totalMaxMs;
    ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(pad, axisY); ctx.lineTo(W-pad, axisY); ctx.stroke();

    for(let i=0; i<=totalMaxMs; i+=(duration <= 10 ? 1000 : 5000)) {
        let x = pad + i * scale;
        ctx.fillStyle = '#999'; ctx.fillText((i/1000)+'s', x, axisY + 35);
    }

    events.forEach(ev => {
        let x = pad + ev.t * scale;
        ctx.fillStyle = ev.color; ctx.beginPath(); ctx.arc(x, axisY, 5, 0, Math.PI*2); ctx.fill();
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:#666">${(ev.t/1000).toFixed(3)}s</span> <span style="color:${ev.color}">${ev.label}</span>`;
        logEl.appendChild(div);
    });
}
window.onload = runSimulation;
</script>
</body>
</html>
