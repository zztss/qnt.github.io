<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>地火诀与攻速模拟器</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        
        /* 顶部核心参数统计 */
        .summary-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #2a2a2a; padding: 12px; border-radius: 8px; border-top: 3px solid #3498db; text-align: center;}
        .stat-label { font-size: 12px; color: #999; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 18px; font-weight: bold; color: #00ff00; font-family: 'Consolas', monospace; }
        .highlight { color: #f1c40f; } /* 强调CD数值 */

        .input-group { display: flex; gap: 15px; margin-bottom: 20px; background: #252525; padding: 15px; border-radius: 8px; align-items: flex-end; border: 1px solid #333; }
        .field { flex: 1; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; }
        input { width: 100%; padding: 10px; background: #121212; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 16px; }
        button { padding: 10px 30px; background: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        button:hover { background: #e74c3c; transform: translateY(-1px); }
        
        .layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        canvas { width: 100%; height: 380px; background: #000; border-radius: 8px; border: 1px solid #333; }
        
        .log-panel { height: 380px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; }
        .log-header { padding: 10px; background: #222; font-size: 12px; font-weight: bold; color: #f1c40f; border-bottom: 1px solid #333; }
        #eventLog { flex: 1; overflow-y: auto; padding: 10px; font-size: 11px; font-family: monospace; line-height: 1.4; color: #ccc; }
        
        .log-cast { color: #3498db; font-weight: bold; }
        .log-hit { color: #2ecc71; }
        .log-break { color: #e74c3c; font-style: italic; }
        .log-time { color: #666; margin-right: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="summary-bar">
        <div class="stat-card" style="border-top-color: #f1c40f;">
            <span class="stat-label">当前技能冷却 (2/攻速)</span>
            <span id="theoryCD" class="stat-value highlight">0.000s</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">总计伤害跳数 (10s)</span>
            <span id="totalHits" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">被打断(顶替)次数</span>
            <span id="brokenHits" class="stat-value" style="color:#e74c3c">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">叠伤爆发点数</span>
            <span id="stackPoints" class="stat-value" style="color:#f39c12">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">DPS效率 (跳/秒)</span>
            <span id="dpsEfficiency" class="stat-value" style="color:#3498db">0</span>
        </div>
    </div>

    <div class="input-group">
        <div class="field">
            <label>玩家攻速 (典型值 1.0 - 2.5)</label>
            <input type="number" id="speed" value="2.0" step="0.01">
        </div>
        <div class="field">
            <label>按键操作延迟 (ms)</label>
            <input type="number" id="delay" value="20">
        </div>
        <button onclick="simulate()">立即刷新计算结果</button>
    </div>

    <div class="layout">
        <canvas id="mainCanvas"></canvas>
        <div class="log-panel">
            <div class="log-header">战斗时间轴明细 (Time Log)</div>
            <div id="eventLog"></div>
        </div>
    </div>
</div>

<script>
function simulate() {
    const speed = parseFloat(document.getElementById('speed').value);
    const delayMs = parseFloat(document.getElementById('delay').value);
    const delay = delayMs / 1000;
    const cd = 2 / speed;
    const interval = cd + delay; 
    
    // 更新顶部CD显示
    document.getElementById('theoryCD').innerText = cd.toFixed(3) + "s";
    
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const logEl = document.getElementById('eventLog');
    logEl.innerHTML = "";
    
    const W = canvas.offsetWidth;
    const H = canvas.offsetHeight;
    canvas.width = W * window.devicePixelRatio;
    canvas.height = H * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    let allHits = [];
    let currentTime = 0;
    let round = 1;
    let brokenCount = 0;

    // 1. 模拟逻辑
    while (currentTime <= 10.01) {
        let nextCastTime = currentTime + interval;
        addLog(`[施法] 第 ${round} 轮启动`, currentTime, "log-cast");

        [0, 1, 2].forEach(idx => {
            let hitTime = currentTime + idx;
            let tagName = `技能${round}的t${idx}`;
            
            if (hitTime <= 10.01) {
                // 打断逻辑：如果在触发时刻，下一轮已经开始了，则该点失效
                if (hitTime < nextCastTime) {
                    allHits.push({ t: hitTime, label: tagName });
                    addLog(`[伤害] ${tagName}`, hitTime, "log-hit");
                } else {
                    brokenCount++;
                    addLog(`[打断] ${tagName} 未跳出即被覆盖`, hitTime, "log-break");
                }
            }
        });

        currentTime = nextCastTime;
        round++;
        if(interval < 0.05) break; 
    }

    // 2. 统计处理
    document.getElementById('totalHits').innerText = allHits.length;
    document.getElementById('brokenHits').innerText = brokenCount;
    document.getElementById('dpsEfficiency').innerText = (allHits.length / 10).toFixed(2);

    const epsilon = 0.05; 
    let clusters = [];
    let processed = new Array(allHits.length).fill(false);
    allHits.sort((a, b) => a.t - b.t);

    for(let i=0; i<allHits.length; i++) {
        if(processed[i]) continue;
        let cluster = [allHits[i]];
        for(let j=i+1; j<allHits.length; j++) {
            if(allHits[j].t - allHits[i].t < epsilon) {
                cluster.push(allHits[j]);
                processed[j] = true;
            }
        }
        clusters.push(cluster);
    }
    document.getElementById('stackPoints').innerText = clusters.filter(c => c.length > 1).length;

    // 3. 画布绘制
    const pad = 40;
    const axisY = H - 80;
    const scale = (W - pad * 2) / 10;

    ctx.strokeStyle = '#444';
    ctx.beginPath();
    ctx.moveTo(pad, axisY); ctx.lineTo(W-pad, axisY);
    ctx.stroke();

    for(let i=0; i<=10; i++) {
        let x = pad + i * scale;
        ctx.fillStyle = '#666'; ctx.fillRect(x, axisY, 1, 10);
        ctx.font = '10px Consolas'; ctx.textAlign = 'center';
        ctx.fillText(i + 's', x, axisY + 25);
    }

    clusters.forEach(c => {
        let avgTime = c.reduce((a,b) => a + b.t, 0) / c.length;
        let x = pad + avgTime * scale;
        let count = c.length;
        let color = count >= 3 ? '#e74c3c' : (count === 2 ? '#f39c12' : '#2ecc71');

        ctx.shadowBlur = 12; ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, axisY - 40, 4 + count*2, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        if(count > 1) {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px Arial';
            ctx.fillText(count, x, axisY - 55);
        }
    });

    function addLog(msg, time, className) {
        const div = document.createElement('div');
        div.innerHTML = `<span class="log-time">${time.toFixed(3)}s</span><span class="${className}">${msg}</span>`;
        logEl.appendChild(div);
    }
}

window.onload = simulate;
</script>
</body>
</html>
